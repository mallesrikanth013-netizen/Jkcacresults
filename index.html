<!DOCTYPE html>
  
<html>
  
<head>
  
<title>JKC Results</title>
  

  
<style>
  
body{
  
font-family:Arial;
  
background:#eef1f5;
  
text-align:center;
  
padding:20px;
  
}
  

  
h1{color:red;}
  
h3{color:#444;margin-top:-10px;}
  

  
.container{
  
background:white;
  
padding:20px;
  
border-radius:8px;
  
width:900px;
  
margin:auto;
  
box-shadow:0 0 10px #ccc;
  
}
  

  
input{
  
padding:10px;
  
width:220px;
  
margin:5px;
  
}
  

  
button{
  
padding:10px 15px;
  
margin:5px;
  
cursor:pointer;
  
}
  

  
table{
  
width:100%;
  
border-collapse:collapse;
  
margin-top:20px;
  
}
  

  
th,td{
  
border:1px solid #ccc;
  
padding:10px;
  
}
  

  
th{background:#f2f2f2;}
  

  
.pass{color:green;font-weight:bold;}
  
.fail{color:red;font-weight:bold;}
  

  
.reval{
  
margin-top:30px;
  
text-align:left;
  
}
  

  
.subject{
  
display:flex;
  
justify-content:space-between;
  
padding:8px;
  
border-bottom:1px solid #ddd;
  
}
  

  
.totalAmt{
  
font-weight:bold;
  
margin-top:10px;
  
}
  
</style>
  

  
</head>
  

  
<body>
  

  
<h1>JKC COLLEGE RESULTS PORTAL</h1>
  
<h3>Jagarlamudi Kuppuswamy Choudary College Autonomous, Guntur</h3>
  

  
<div class="container">
  

  
<input type="text" id="regno" placeholder="Enter Reg No">
  
<button onclick="showResult()">Check</button>
  

  
<div id="result"></div>
  

  
</div>
  

  
<script>
  

  
const studentDB={
  

  
"250727":{ name:"BANDI KUSHVANTH REDDY", results:[ {code:"100125",name:"ENGLISH BRIDGE-I",cia:"24/40",see:"44/60",total:68},
  
{code:"100225",name:"SAHITHI VASANTHAM",cia:"28/40",see:"00/80",total:28},
  
{code:"101125",name:"AI FUNDAMENTALS",cia:"31/40",see:"37/60",total:68},
  
{code:"111925",name:"COMPUTER FUNDAMENTALS",cia:"24/40",see:"24/60",total:48},
  
{code:"1119P25",name:"COMPUTER LAB",cia:"7/10",see:"26/40",total:33},
  
{code:"112025",name:"C PROGRAMMING",cia:"19/40",see:"28/60",total:47}, 
  
{code:"1120P25",name:"C LAB",cia:"10/10",see:"16/40",total:26}
  
] 
  
  
  
},
  

  
// NEXT STUDENT DATA ADD HERE
  

  
};
  

  

  
function showResult(){
  

  
let reg=document.getElementById("regno").value;
  
let s=studentDB[reg];
  
let out=document.getElementById("result");
  

  
if(!s){
  
out.innerHTML="<h3 style='color:red'>No Data</h3>";
  
return;
  
}
  

  
let html=`<h2>${s.name}</h2>`;
  

  
html+=`
  
<table>
  
<tr>
  
<th>Code</th>
  
<th>Subject</th>
  
<th>CIA</th>
  
<th>SEE</th>
  
<th>Total</th>
  
<th>Status</th>
  
</tr>
  
`;
  

  
s.results.forEach((r,i)=>{
  

  
let pass=r.total>=21;
  

  
html+=`
  
<tr>
  
<td>${r.code}</td>
  
<td>${r.name}</td>
  
<td>${r.cia}</td>
  
<td>${r.see}</td>
  
<td>${r.total}</td>
  
<td class="${pass?'pass':'fail'}">${pass?'PASS':'FAIL'}</td>
  
</tr>
  
`;
  

  
});
  

  
html+=`</table>
  

  
<br>
  

  
<button onclick="window.print()">Print</button>
  
<button onclick="download()">Download</button>
  

  
<div class="reval">
  
<h3>Revaluation (₹750 each)</h3>
  
`;
  

  
s.results.forEach((r,i)=>{
  
html+=`
  
<div class="subject">
  
<label>
  
<input type="checkbox" onchange="calcTotal()"> ${r.name}
  
</label>
  
<span>₹750</span>
  
</div>
  
`;
  
});
  

  
html+=`
  
<div class="totalAmt">Total Amount: ₹<span id="amt">0</span></div>
  

  
<input type="text" id="utr" placeholder="Enter UTR / TRN Number">
  

  
<br>
  
<button onclick="submitReval()">Submit</button>
  
</div>
  
`;
  

  
out.innerHTML=html;
  

  
}
  

  

  
function calcTotal(){
  
let checks=document.querySelectorAll("input[type=checkbox]:checked");
  
let total=checks.length*750;
  
document.getElementById("amt").innerText=total;
  
}
  

  

  
function submitReval(){
  
let utr=document.getElementById("utr").value;
  
let amt=document.getElementById("amt").innerText;
  

  
if(amt==0){
  
alert("Select at least one subject");
  
return;
  
}
  

  
if(utr==""){
  
alert("Enter UTR / TRN Number");
  
return;
  
}
  

  
alert("Revaluation Applied Successfully ✅\nAmount: ₹"+amt+"\nUTR: "+utr);
  
}
  

  

  
function download(){
  
let text=document.getElementById("result").innerText;
  
let blob=new Blob([text],{type:"text/plain"});
  
let a=document.createElement("a");
  
a.href=URL.createObjectURL(blob);
  
a.download="result.txt";
  
a.click();
  
}
  

  
</script>
  

  
</body>
  
</html>
