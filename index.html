<!DOCTYPE html>
<html>
<head>
<title>JKC College Results Portal</title>

<style>
body{
font-family:Arial;
background:#f5f5f5;
padding:20px;
text-align:center;
}

h1{color:red;margin-bottom:5px;}
.subtitle{color:#555;margin-bottom:30px;}

.searchbox{margin-bottom:20px;}

input{padding:10px;font-size:16px;}
button{padding:10px 15px;margin:5px;cursor:pointer;}

#resultBox{margin-top:20px;}

.student-info{
background:white;
padding:15px;
width:900px;
margin:auto;
border-radius:6px;
box-shadow:0 0 5px #ccc;
text-align:left;
}

table{
width:100%;
border-collapse:collapse;
margin-top:15px;
}

th,td{
border:1px solid #ccc;
padding:10px;
text-align:center;
}

th{background:#eee;}

.pass{color:green;font-weight:bold;}
.fail{color:red;font-weight:bold;}

.actions{margin-top:15px;}

</style>
</head>

<body>

<h1>JKC COLLEGE RESULTS PORTAL</h1>
<div class="subtitle">Jagarlamudi Kuppuswamy Choudary College</div>

<div class="searchbox">
<input type="text" id="regno" placeholder="Enter Registration Number">
<button onclick="showResult()">Check Result</button>
</div>

<div id="resultBox"></div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const firebaseConfig = {
apiKey: "AIzaSyA40F7vVh6zQYxnqbAQEl8xtWsJBoXzpmE",
authDomain: "jkcresults-34ee4.firebaseapp.com",
projectId: "jkcresults-34ee4",
storageBucket: "jkcresults-34ee4.firebasestorage.app",
messagingSenderId: "260797558344",
appId: "1:260797558344:web:baa984235ff8558797727d"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

async function showResult(){

let reg=document.getElementById("regno").value.trim();
let box=document.getElementById("resultBox");

const ref=doc(db,"Students",reg);
const snap=await getDoc(ref);

if(snap.exists()){

let data=snap.data();

box.innerHTML=`
<div class="student-info">

<h2>${data.Name}</h2>

<p><b>Course:</b> ${data.Course}</p>
<p><b>Semester:</b> ${data.Semester}</p>

</div>
`;

}else{

box.innerHTML="<h3 style='color:red'>Result not found</h3>";

}

}

window.showResult=showResult;

function downloadResult(){

let content=document.getElementById("resultBox").innerText;

let blob=new Blob([content],{type:"text/plain"});

let a=document.createElement("a");

a.href=URL.createObjectURL(blob);

a.download="JKC_Result.txt";

a.click();

}
</script>



</body>
</html>
