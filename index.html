<!DOCTYPE html>
<html>
<head>
<title>JKC College Results Portal</title>

<style>
body{
font-family:Arial;
background:#f2f2f2;
text-align:center;
padding:20px;
}

h1{
color:red;
}

input{
padding:10px;
font-size:16px;
}

button{
padding:10px 15px;
margin:5px;
font-size:15px;
cursor:pointer;
}

table{
width:90%;
margin:auto;
border-collapse:collapse;
background:white;
margin-top:20px;
}

th,td{
border:1px solid #ccc;
padding:10px;
}

th{
background:#eee;
}

.pass{
color:green;
font-weight:bold;
}

.fail{
color:red;
font-weight:bold;
}

#resultBox{
margin-top:30px;
}

.revaluation{
margin-top:20px;
padding:15px;
background:white;
width:400px;
margin-left:auto;
margin-right:auto;
border-radius:6px;
}
</style>

</head>

<body>

<h1>JKC COLLEGE RESULTS PORTAL</h1>

<p>Enter Registration Number</p>

<input type="text" id="regno" placeholder="Enter Reg No">
<button onclick="showResult()">Check Result</button>

<div id="resultBox"></div>

<script>

const studentDB = {

"250726":{
name:"BANDI KUSHVANTH REDDY",
results:[
{subject:"ENGLISH",marks:68},
{subject:"SAHITHI VASANTHAM",marks:28},
{subject:"AI FUNDAMENTALS",marks:68},
{subject:"COMPUTER FUNDAMENTALS",marks:48}
]
},

"250727":{
name:"BANDI SATHYATEJA",
results:[
{subject:"ENGLISH",marks:53},
{subject:"SAHITHI VASANTHAM",marks:57},
{subject:"AI FUNDAMENTALS",marks:68},
{subject:"COMPUTER FUNDAMENTALS",marks:47}
]
},

// NEXT STUDENT DATA ADD HERE

};


function showResult(){

let reg=document.getElementById("regno").value;
let student=studentDB[reg];
let box=document.getElementById("resultBox");

if(!student){
box.innerHTML="<h3 style='color:red'>Student Not Found</h3>";
return;
}

let html="<h2>"+student.name+"</h2>";

html+="<table>";
html+="<tr><th>Subject</th><th>Marks</th><th>Status</th></tr>";

student.results.forEach(r=>{

let status=r.marks>=21?"PASS":"FAIL";
let className=r.marks>=21?"pass":"fail";

html+=`
<tr>
<td>${r.subject}</td>
<td>${r.marks}</td>
<td class="${className}">${status}</td>
</tr>
`;

});

html+="</table>";

html+=`
<br>

<button onclick="window.print()">Print Result</button>

<button onclick="downloadResult()">Download Result</button>

<div class="revaluation">

<h3>Apply Revaluation</h3>

<input type="text" placeholder="Enter Account Number">

<br><br>

<button>Submit</button>

</div>
`;

box.innerHTML=html;

}


function downloadResult(){

let content=document.getElementById("resultBox").innerText;

let blob=new Blob([content],{type:"text/plain"});

let a=document.createElement("a");

a.href=URL.createObjectURL(blob);

a.download="result.txt";

a.click();

}

</script>

</body>
</html>
