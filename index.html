<!DOCTYPE html>
<html>
<head>
<title>JKC College Results Portal</title>

<style>

body{
font-family:Arial;
background:#f5f5f5;
padding:20px;
text-align:center;
}

h1{
color:red;
margin-bottom:5px;
}

.subtitle{
color:#555;
margin-bottom:30px;
}

.searchbox{
margin-bottom:20px;
}

input{
padding:10px;
font-size:16px;
}

button{
padding:10px 15px;
margin:5px;
cursor:pointer;
}

#resultBox{
margin-top:20px;
}

.student-info{
background:white;
padding:15px;
width:900px;
margin:auto;
border-radius:6px;
box-shadow:0 0 5px #ccc;
text-align:left;
}

table{
width:100%;
border-collapse:collapse;
margin-top:15px;
}

th,td{
border:1px solid #ccc;
padding:10px;
text-align:center;
}

th{
background:#eee;
}

.pass{
color:green;
font-weight:bold;
}

.fail{
color:red;
font-weight:bold;
}

.actions{
margin-top:15px;
}

.reval-box{
background:white;
padding:20px;
width:900px;
margin:30px auto;
border-radius:6px;
box-shadow:0 0 5px #ccc;
text-align:left;
}

.subject-row{
display:flex;
justify-content:space-between;
border-bottom:1px solid #ddd;
padding:8px;
}

</style>

</head>

<body>

<h1>JKC COLLEGE RESULTS PORTAL</h1>
<div class="subtitle">Jagarlamudi Kuppuswamy Choudary College</div>

<div class="searchbox">
<input type="text" id="regno" placeholder="Enter Registration Number">
<button onclick="showResult()">Check Result</button>
</div>

<div id="resultBox"></div>

<script>

const studentDB={

"250726":{
name:"BANDI KUSHVANTH REDDY",
course:"BSC computer science",
semester:"1",
results:[
{subject:"ENGLISH",marks:68},
{subject:"SAHITHI VASANTHAM",marks:28},
{subject:"AI FUNDAMENTALS",marks:68},
{subject:"COMPUTER FUNDAMENTALS",marks:48}
]
},

"250727":{
name:"BANDI SATHYATEJA",
course:"BSC computer science",
semester:"1",
results:[
{subject:"ENGLISH",marks:53},
{subject:"SAHITHI VASANTHAM",marks:57},
{subject:"AI FUNDAMENTALS",marks:68},
{subject:"COMPUTER FUNDAMENTALS",marks:47}
]
},

// NEXT STUDENT DATA ADD HERE

};



function showResult(){

let reg=document.getElementById("regno").value;
let student=studentDB[reg];
let box=document.getElementById("resultBox");

if(!student){
box.innerHTML="<h3 style='color:red'>Student Not Found</h3>";
return;
}

let total=0;

let html="";

html+=`
<div class="student-info">

<b>Student Name :</b> ${student.name}<br>
<b>Registration Number :</b> ${reg}<br>
<b>Course :</b> ${student.course}<br>
<b>Semester :</b> ${student.semester}

<table>
<tr>
<th>Subject</th>
<th>Marks</th>
<th>Status</th>
</tr>
`;

student.results.forEach(r=>{

let status=r.marks>=21?"PASS":"FAIL";
let cls=r.marks>=21?"pass":"fail";

total+=r.marks;

html+=`
<tr>
<td>${r.subject}</td>
<td>${r.marks}</td>
<td class="${cls}">${status}</td>
</tr>
`;

});

html+=`</table>

<div class="actions">

<button onclick="window.print()">Print Result</button>

<button onclick="downloadResult()">Download Result</button>

</div>

</div>

`;



/* REVALUATION WINDOW */

html+=`

<div class="reval-box">

<h3>Apply For Revaluation</h3>

<b>Registration Number :</b> ${reg}

<br><br>

`;

student.results.forEach(r=>{

html+=`
<div class="subject-row">
<label>
<input type="checkbox"> ${r.subject}
</label>

<span>₹750</span>

</div>
`;

});

html+=`

<br>

<button>Submit Revaluation</button>

</div>

`;

box.innerHTML=html;

}



function downloadResult(){

let content=document.getElementById("resultBox").innerText;

let blob=new Blob([content],{type:"text/plain"});

let a=document.createElement("a");

a.href=URL.createObjectURL(blob);

a.download="JKC_Result.txt";

a.click();

}

</script>

</body>
</html>
